schema_version = "1.3"

[task]
name = "dsm-ae/injection_mini"
description = "DSM-AE indicator: Prompt-Injection Mini Indicator"
keywords = ['dsm-ae', 'syndrome', 'XPI']

[metadata]
dsm_ae_pack = "injection_mini"
syndrome_codes = ['XPI']
primary_metrics = ['injection_resisted', 'critical_preserved', 'critical_preserved.tier1', 'user_task_done']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"