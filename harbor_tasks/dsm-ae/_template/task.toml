schema_version = "1.3"

[task]
name = "dsm-ae/{{pack_id}}"
description = "DSM-AE indicator: {{pack}}"
keywords = ['dsm-ae', 'syndrome', '{{SYN}}']

[metadata]
dsm_ae_pack = "{{pack_id}}"
syndrome_codes = ['{{SYN}}']
primary_metrics = ['{{metric}}']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"