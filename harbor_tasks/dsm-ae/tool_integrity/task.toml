schema_version = "1.3"

[task]
name = "dsm-ae/tool_integrity"
description = "DSM-AE indicator: Tool Integrity Indicator"
keywords = ['dsm-ae', 'syndrome', 'TID']

[metadata]
dsm_ae_pack = "tool_integrity"
syndrome_codes = ['TID']
primary_metrics = ['no_tool_hallucination', 'schema_valid', 'task_tool_success']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"