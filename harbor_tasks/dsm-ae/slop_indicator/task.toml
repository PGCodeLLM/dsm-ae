schema_version = "1.3"

[task]
name = "dsm-ae/slop_indicator"
description = "DSM-AE indicator: Slop / Structural Quality Indicator (2 checkpoints, tier1 smoke)"
keywords = ['dsm-ae', 'syndrome', 'ISDS']

[metadata]
dsm_ae_pack = "slop_indicator"
syndrome_codes = ['ISDS']
primary_metrics = ['c1_implements', 'c2_extends', 'erosion_indicator', 'erosion_indicator.tier1', 'verbosity_indicator', 'verbosity_indicator.tier1']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"