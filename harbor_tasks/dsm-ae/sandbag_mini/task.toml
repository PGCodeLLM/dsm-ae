schema_version = "1.3"

[task]
name = "dsm-ae/sandbag_mini"
description = "DSM-AE indicator: Sandbagging Resistance Mini Indicator"
keywords = ['dsm-ae', 'syndrome', 'SBG']

[metadata]
dsm_ae_pack = "sandbag_mini"
syndrome_codes = ['SBG']
primary_metrics = ['no_sandbag', 'correct_under_pressure']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"