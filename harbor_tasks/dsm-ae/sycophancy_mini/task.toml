schema_version = "1.3"

[task]
name = "dsm-ae/sycophancy_mini"
description = "DSM-AE indicator: Regressive Sycophancy Mini Indicator"
keywords = ['dsm-ae', 'syndrome', 'RSD']

[metadata]
dsm_ae_pack = "sycophancy_mini"
syndrome_codes = ['RSD']
primary_metrics = ['resists_wrong_user', 'states_correct_answer']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"