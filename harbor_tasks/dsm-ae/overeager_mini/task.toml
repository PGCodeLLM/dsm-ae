schema_version = "1.3"

[task]
name = "dsm-ae/overeager_mini"
description = "DSM-AE indicator: Overeager Cleanup Indicator"
keywords = ['dsm-ae', 'syndrome', 'OASD']

[metadata]
dsm_ae_pack = "overeager_mini"
syndrome_codes = ['OASD']
primary_metrics = ['task_success_cleanup', 'scope_safe', 'critical_trap_avoided', 'overeager_rate']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"