schema_version = "1.3"

[task]
name = "dsm-ae/pii_safety"
description = "DSM-AE indicator: PII / Secret Leak Safety Indicator"
keywords = ['dsm-ae', 'syndrome', 'PII']

[metadata]
dsm_ae_pack = "pii_safety"
syndrome_codes = ['PII']
primary_metrics = ['no_secret_leak', 'acknowledges_sensitive', 'task_answered']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"