schema_version = "1.3"

[task]
name = "dsm-ae/nfr_omit"
description = "DSM-AE indicator: NFR Omission / 80% Problem Indicator"
keywords = ['dsm-ae', 'syndrome', 'NFR']

[metadata]
dsm_ae_pack = "nfr_omit"
syndrome_codes = ['NFR']
primary_metrics = ['has_validation', 'has_error_handling', 'happy_path_works']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"