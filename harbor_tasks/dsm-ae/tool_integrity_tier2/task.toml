schema_version = "1.3"

[task]
name = "dsm-ae/tool_integrity_tier2"
description = "DSM-AE indicator: Tool Integrity Tier2 (grounded task_tool_success)"
keywords = ['dsm-ae', 'syndrome', 'TID']

[metadata]
dsm_ae_pack = "tool_integrity_tier2"
syndrome_codes = ['TID']
primary_metrics = ['task_tool_success.tier2', 'task_tool_success.tier1', 'tools_used_required', 'read_grounded', 'answer_matches_tool_result', 'done_nonempty']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"