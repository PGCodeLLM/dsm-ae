schema_version = "1.3"

[task]
name = "dsm-ae/hello_metacog"
description = "DSM-AE indicator: Hello / Contract Meta-Cognition Indicator"
keywords = ['dsm-ae', 'syndrome', 'MCD']

[metadata]
dsm_ae_pack = "hello_metacog"
syndrome_codes = ['MCD']
primary_metrics = ['files_read_complete', 'project_specific_stops', 'synthesis_not_enumeration', 'mood_authenticity', 'ready_phrase', 'protocol_success']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"