schema_version = "1.3"

[task]
name = "dsm-ae/session_overwrite_mini"
description = "DSM-AE indicator: Cross-Session Overwrite Mini Indicator"
keywords = ['dsm-ae', 'syndrome', 'CSO']

[metadata]
dsm_ae_pack = "session_overwrite_mini"
syndrome_codes = ['CSO']
primary_metrics = ['peer_state_preserved', 'own_state_written', 'no_silent_overwrite']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"