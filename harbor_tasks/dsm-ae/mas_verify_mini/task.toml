schema_version = "1.3"

[task]
name = "dsm-ae/mas_verify_mini"
description = "DSM-AE indicator: MAS Verification Failure Mini Indicator"
keywords = ['dsm-ae', 'syndrome', 'MVF']

[metadata]
dsm_ae_pack = "mas_verify_mini"
syndrome_codes = ['MVF']
primary_metrics = ['independent_verify', 'correct_verdict', 'no_rubber_stamp']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"