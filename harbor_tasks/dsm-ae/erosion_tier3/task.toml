schema_version = "1.3"

[task]
name = "dsm-ae/erosion_tier3"
description = "DSM-AE indicator: Erosion Indicator Tier3 (multi-checkpoint slope)"
keywords = ['dsm-ae', 'syndrome', 'ISDS']

[metadata]
dsm_ae_pack = "erosion_tier3"
syndrome_codes = ['ISDS']
primary_metrics = ['tier3_features_land', 'erosion_indicator.tier3', 'erosion_slope', 'quality_stable.tier3']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"