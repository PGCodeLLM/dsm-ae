schema_version = "1.3"

[task]
name = "dsm-ae/coord_tax_mini"
description = "DSM-AE indicator: Coordination Tax Amplification Mini Indicator"
keywords = ['dsm-ae', 'syndrome', 'CTX']

[metadata]
dsm_ae_pack = "coord_tax_mini"
syndrome_codes = ['CTX']
primary_metrics = ['final_answer_correct', 'coordination_artifacts', 'low_coord_churn']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"