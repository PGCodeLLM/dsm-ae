schema_version = "1.3"

[task]
name = "dsm-ae/role_confusion_mini"
description = "DSM-AE indicator: Role Confusion (MAS Spec) Mini Indicator"
keywords = ['dsm-ae', 'syndrome', 'MRC']

[metadata]
dsm_ae_pack = "role_confusion_mini"
syndrome_codes = ['MRC']
primary_metrics = ['role_boundary_held', 'review_artifact_written', 'role_spec_ok']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"