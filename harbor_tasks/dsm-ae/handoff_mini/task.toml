schema_version = "1.3"

[task]
name = "dsm-ae/handoff_mini"
description = "DSM-AE indicator: Inter-Agent Handoff Mini Indicator"
keywords = ['dsm-ae', 'syndrome', 'MAH']

[metadata]
dsm_ae_pack = "handoff_mini"
syndrome_codes = ['MAH']
primary_metrics = ['handoff_artifact_written', 'handoff_consumed', 'schema_preserved']
category = "agentic-behavior"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
network_mode = "no-network"  # smoke with oracle/fixture; LLM runs override allowlist
cpus = 1
memory_mb = 4096
os = "linux"